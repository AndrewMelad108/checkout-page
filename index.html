<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Page</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Header -->
    <header
      class="h-[93px] container mx-auto flex justify-between border-b-1 border-black/8"
    >
      <!-- Logo -->
      <div class="flex items-center gap-4">
        <img src="./images/logo.svg" alt="Logo" />
        <p class="font-bold text-[22px]" data-i18n="brand">AURA</p>
      </div>

      <!-- Navigation -->
      <div class="flex items-center">
        <div class="rounded-full h-1 w-1 bg-[#6B6B6B] mr-4"></div>
        <div
          class="font-medium text-[13px] text-[#6B6B6B] flex items-center gap-2"
        >
          <img src="./images/shipping.svg" alt="shipping icon" />
          <span data-i18n="shipping">Fast shipping</span>
        </div>
      </div>

      <!-- Language Selector -->
      <div
        id="lang-toggle"
        role="button"
        tabindex="0"
        aria-label="Switch to Arabic"
        data-next-lang="ar"
        class="w-[52px] h-[77px] h-full bg-[#C2A878] rounded-b-[5px] flex flex-col items-center justify-center gap-[15px] cursor-pointer"
      >
        <img src="./images/Language Skill.svg" alt="Language Selector" />
        <span
          id="lang-toggle-label"
          class="font-medium font-bold text-white text-[20px]"
          >EN</span
        >
      </div>
    </header>

    <!-- Banner -->
    <div class="flex items-center justify-center my-[44px]">
      <img
        src="https://placehold.co/1312x574"
        alt="Banner image"
        class="radius-[15px]"
      />
    </div>

    <!-- Main Content -->
    <main class="container bg-white radius-[25px] p-12">
      <!-- Heading -->
      <h1 class="font-semibold text-[28px] tracking-tighter">Products info</h1>

      <!-- Product List -->
      <div id="product-list" class="grid grid-cols-3 gap-4 mt-[43px]">
        <!-- T-Shirt -->
        <div
          class="border-1 radius-[25px] border-[#F5F3EF] shadow-[0_10px_40px_0_#F5F3EF,0_-10px_40px_0_#F5F3EF] overflow-hidden"
        >
          <div class="relative">
            <img
              src="https://placehold.co/336x306"
              alt="Banner image"
              class="radius-t-[15px] w-full object-cover"
            />
            <span
              class="absolute top-4 -left-3 text-center font-bold -rotate-45 text-[12px] text-white bg-black w-[80px] h-[16px] radius-[50px] transform z-10"
              >10%</span
            >
          </div>
          <div class="p-4">
            <p
              class="font-semibold text-[20px] tracking-tighter capitalize w-fit"
            >
              t-shirt
            </p>
          </div>
        </div>
      </div>
    </main>
  </body>

  <script src="./main.js"></script>
</html>
